name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            binary_name: debun
            asset_name: debun-linux-x86_64.tar.gz
          - os: macos-latest
            label: macos-arm64
            binary_name: debun
            asset_name: debun-macos-arm64.tar.gz
          - os: windows-latest
            label: windows-x86_64
            binary_name: debun.exe
            asset_name: debun-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/release/${{ matrix.binary_name }} dist/
          cp README.md dist/
          tar -C dist -czf ${{ matrix.asset_name }} .

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item target/release/${{ matrix.binary_name }} dist/
          Copy-Item README.md dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.asset_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
